server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: mittelstandgpt
  # Backend selection (Workstream D): `local` (default, fully offline Ollama+Qdrant)
  # or `azure` (Azure OpenAI + Azure AI Search). Telemetry verbosity is an
  # orthogonal dimension: optionally add `dev` (export prompt/response content) or
  # `prod` (content export off, GDPR). Example: SPRING_PROFILES_ACTIVE=azure,prod
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  servlet:
    multipart:
      # Generous limits for document uploads.
      max-file-size: 50MB
      max-request-size: 50MB
  ai:
    chat:
      observations:
        # Prompt/response CONTENT in telemetry is OFF by default (GDPR). The `dev`
        # profile turns it on; `prod` keeps it off. Token counts and latency are
        # always captured (they carry no document content).
        log-prompt: ${MI_OBSERVE_CONTENT:false}
        log-completion: ${MI_OBSERVE_CONTENT:false}

# Agentic retrieval loop (Workstream A). Explicit env placeholders keep the exact
# variable names from the brief: MI_RAG_MAX_HOPS / MI_RAG_TOPK / MI_RAG_GRADING_ENABLED.
mi:
  rag:
    max-hops: ${MI_RAG_MAX_HOPS:3}
    top-k: ${MI_RAG_TOPK:4}
    grading-enabled: ${MI_RAG_GRADING_ENABLED:true}
    # Optional deterministic precision lever (0.0 = accept all top-k).
    similarity-threshold: ${MI_RAG_SIMILARITY_THRESHOLD:0.0}
  # Per-1000-token prices used to derive an estimated request cost metric. Default
  # 0.0 (the local model is free); set real prices per model/profile (e.g. azure).
  cost:
    input-per-1k: ${MI_COST_INPUT_PER_1K:0.0}
    output-per-1k: ${MI_COST_OUTPUT_PER_1K:0.0}
    currency: ${MI_COST_CURRENCY:EUR}

# Actuator + observability (Workstream C).
management:
  endpoints:
    web:
      exposure:
        # Prometheus scrape endpoint exposes token/cost metrics; health for Docker.
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  # Span export is opt-in via the `dev`/`prod` profile (which point OTLP at
  # self-hosted Langfuse). The default profile makes no export attempts, so it runs
  # fully offline; Micrometer metrics (incl. tokens/cost) are always available.
  tracing:
    enabled: ${MI_TRACING_ENABLED:false}
    sampling:
      probability: ${MI_TRACING_SAMPLING:1.0}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:}
      transport: http
